name: Build deploy branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://user:password@localhost:3306/sunspark
      NEXT_PUBLIC_SITE_URL: https://sunsparkelectricals.co.ke
      NEXT_PRIVATE_BUILD_WORKER_COUNT: "1"
      NODE_ENV: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build standalone app
        run: npm run build -- --webpack

      - name: Prepare deploy artifact
        run: |
          rm -rf deploy-artifact
          mkdir -p deploy-artifact
          cp -a .next/standalone/. deploy-artifact/
          rm -f deploy-artifact/.env
          mkdir -p deploy-artifact/.next
          cp -a .next/static deploy-artifact/.next/static
          cp -a public deploy-artifact/public
          cp .env.example deploy-artifact/.env.example
          cp -a docs deploy-artifact/docs
          cp -a prisma deploy-artifact/prisma
          cat > deploy-artifact/README.deploy.md <<'EOF'
          # Sunspark Deploy Artifact

          This branch is built by GitHub Actions from `main`.
          Pull this branch on HostAfrica when shared hosting kills `npm ci`.
          Keep the real `.env` file on the server. Do not commit secrets.
          EOF

      - name: Publish deploy branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd deploy-artifact
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b deploy
          git add .
          git commit -m "Build deploy artifact for ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin deploy
